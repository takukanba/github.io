<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>こどもの行動相談室 | 神庭拓也</title>
  <meta name="description" content="毎日の困りごとを、一緒に整理する場所。ABA・行動分析の視点から、お子さんの行動の理由を丁寧に読み解きます。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ecru: #F6F2EB;
      --ecru-dark: #EDE8DF;
      --warm-white: #FDFAF6;
      --ink: #1E1C18;
      --ink-mid: #4A4740;
      --ink-light: #7A776F;
      --moss: #3D5C38;
      --moss-mid: #5A7D55;
      --moss-pale: #E8EEE6;
      --sand: #C4A882;
      --border: #D8D2C8;
      --font-serif: 'Noto Serif JP', 'EB Garamond', serif;
      --font-sans: 'Noto Sans JP', sans-serif;
      --font-roman: 'EB Garamond', serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      background: var(--ecru);
      color: var(--ink);
      line-height: 1.85;
      font-size: 16px;
      font-weight: 300;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(246, 242, 235, 0.96);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .nav-logo {
      font-family: var(--font-serif);
      font-size: 14px;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: 0.08em;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      font-size: 12px;
      color: var(--ink-light);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--moss); }

    /* HERO */
    .hero {
      padding: 80px 32px 72px;
      max-width: 680px;
      margin: 0 auto;
    }

    .hero-eyebrow {
      font-family: var(--font-roman);
      font-size: 13px;
      color: var(--ink-light);
      letter-spacing: 0.12em;
      margin-bottom: 28px;
      display: block;
    }

    .hero h1 {
      font-family: var(--font-serif);
      font-size: clamp(26px, 5vw, 38px);
      font-weight: 400;
      line-height: 1.6;
      letter-spacing: 0.04em;
      color: var(--ink);
      margin-bottom: 28px;
    }

    .hero-sub {
      font-size: 15px;
      color: var(--ink-mid);
      line-height: 2;
      margin-bottom: 40px;
      font-weight: 300;
    }

    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 44px;
    }

    .badge {
      font-size: 11px;
      letter-spacing: 0.05em;
      color: var(--moss);
      border: 1px solid var(--moss-mid);
      padding: 5px 12px;
      border-radius: 2px;
      background: var(--moss-pale);
    }

    .cta-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn-primary {
      display: inline-block;
      background: var(--moss);
      color: #fff;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.06em;
      padding: 14px 28px;
      text-decoration: none;
      border-radius: 2px;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: var(--moss-mid); }

    .btn-instagram {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--ink-mid);
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }

    .btn-instagram:hover { color: var(--moss); }

    /* DIVIDER */
    .divider {
      width: 48px;
      height: 1px;
      background: var(--sand);
      margin: 0 auto;
    }

    /* SECTION */
    section {
      padding: 72px 32px;
      max-width: 680px;
      margin: 0 auto;
    }

    .section-label {
      font-family: var(--font-roman);
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--ink-light);
      text-transform: uppercase;
      margin-bottom: 32px;
      display: block;
    }

    section h2 {
      font-family: var(--font-serif);
      font-size: clamp(20px, 3.5vw, 26px);
      font-weight: 400;
      letter-spacing: 0.04em;
      margin-bottom: 24px;
      color: var(--ink);
      line-height: 1.65;
    }

    section p {
      color: var(--ink-mid);
      font-size: 15px;
      line-height: 2;
      margin-bottom: 20px;
      font-weight: 300;
    }

    /* TROUBLES */
    .troubles-list {
      list-style: none;
      display: grid;
      gap: 12px;
      margin-top: 28px;
    }

    .troubles-list li {
      font-size: 15px;
      color: var(--ink-mid);
      padding: 16px 20px;
      background: var(--warm-white);
      border-left: 2px solid var(--sand);
      border-radius: 1px;
      font-weight: 300;
      line-height: 1.7;
    }

    /* STEPS */
    .steps {
      display: grid;
      gap: 0;
      margin-top: 32px;
    }

    .step {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 20px;
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .step:last-child { border-bottom: none; }

    .step-num {
      font-family: var(--font-roman);
      font-size: 22px;
      color: var(--sand);
      font-style: italic;
      line-height: 1.3;
      padding-top: 2px;
    }

    .step-title {
      font-family: var(--font-serif);
      font-size: 16px;
      font-weight: 400;
      color: var(--ink);
      margin-bottom: 8px;
      letter-spacing: 0.03em;
    }

    .step-desc {
      font-size: 14px;
      color: var(--ink-light);
      line-height: 1.8;
      font-weight: 300;
    }

    .step-price {
      display: inline-block;
      font-family: var(--font-roman);
      font-size: 13px;
      color: var(--moss);
      margin-top: 8px;
      letter-spacing: 0.04em;
    }

    /* PROFILE */
    .profile-inner {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 40px;
      margin-top: 8px;
    }

    .profile-name {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .profile-name-en {
      font-family: var(--font-roman);
      font-size: 13px;
      color: var(--ink-light);
      letter-spacing: 0.1em;
      margin-bottom: 24px;
      display: block;
    }

    .profile-text {
      font-size: 14px;
      color: var(--ink-mid);
      line-height: 2;
      margin-bottom: 16px;
      font-weight: 300;
    }

    .profile-creds {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
    }

    .profile-creds li {
      font-size: 11px;
      color: var(--ink-light);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 2px;
      letter-spacing: 0.04em;
    }

    /* CONTACT */
    .contact-box {
      background: var(--moss-pale);
      border: 1px solid #C8D9C5;
      border-radius: 4px;
      padding: 40px;
      text-align: center;
    }

    .contact-box h3 {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 12px;
      color: var(--ink);
      letter-spacing: 0.04em;
    }

    .contact-box p {
      font-size: 14px;
      color: var(--ink-mid);
      margin-bottom: 28px;
      font-weight: 300;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 40px 32px;
      text-align: center;
    }

    .footer-name {
      font-family: var(--font-serif);
      font-size: 14px;
      letter-spacing: 0.06em;
      color: var(--ink-mid);
      margin-bottom: 8px;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      list-style: none;
      margin-bottom: 20px;
    }

    .footer-links a {
      font-size: 12px;
      color: var(--ink-light);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--moss); }

    .footer-copy {
      font-family: var(--font-roman);
      font-size: 12px;
      color: var(--ink-light);
      letter-spacing: 0.06em;
    }

    /* FADE IN */
    .fade-in {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* MOBILE */
    @media (max-width: 600px) {
      nav { padding: 0 20px; }
      .nav-links { gap: 20px; }
      .hero, section { padding-left: 20px; padding-right: 20px; }
      .profile-inner, .contact-box { padding: 28px 20px; }
    }
  </style>
</head>
<body>
